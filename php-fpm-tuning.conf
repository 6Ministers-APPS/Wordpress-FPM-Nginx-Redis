[www]
; Возвращаем dynamic, чтобы не съесть всю RAM и не уйти в Swap
pm = dynamic

; Максимальный предел (потолок)
; Снижено с 10: при memory_limit=1024M и хосте 6 ГБ RAM пик 10x1024M=10.2 ГБ
; переполнял бы хост. 5x1024M=5.12 ГБ оставляет запас под MariaDB/Redis/Nginx.
pm.max_children = 5

; Сколько держать запущенными всегда (для быстрого старта)
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Защита от утечек (почаще перезапускать)
pm.max_requests = 1000

; Таймаут (убивать зависшие скрипты быстрее)
request_terminate_timeout = 60s