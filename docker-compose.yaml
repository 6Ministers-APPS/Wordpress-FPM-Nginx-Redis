# documentation: https://wordpress.org 
# slogan: Wordpress is open source software you can use to create a beautiful website, blog, or app.
# tags: cms, blog, content, management, mariadb
# logo: svgs/wordpress.svg

services:
  wordpress:
    build: .
    volumes:
      - ./wordpress-files:/var/www/html
      - ./php/wp-php.ini:/usr/local/etc/php/conf.d/wp-php.ini
      - ./init-script.sh:/usr/local/bin/init-script.sh
      - ./php-fpm-tuning.conf:/usr/local/etc/php-fpm.d/zz-tuning.conf
      - fastcgi_cache:/var/run/nginx-cache
    environment:
      - SERVICE_FQDN_WORDPRESS
      - WORDPRESS_DB_HOST=mariadb
      - WORDPRESS_DB_USER=$SERVICE_USER_WORDPRESS
      - WORDPRESS_DB_PASSWORD=$SERVICE_PASSWORD_WORDPRESS
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DEBUG=false
      # Если в Coolify переменная не задана, будет использовано значение после ":-"
      - WP_DEBUG=${WP_DEBUG:-false}
      - WP_DEBUG_LOG=${WP_DEBUG_LOG:-false}
      - WP_DEBUG_DISPLAY=${WP_DEBUG_DISPLAY:-false}
    depends_on:
      - mariadb
    command: sh -c "chmod +x /usr/local/bin/init-script.sh && /usr/local/bin/init-script.sh & docker-entrypoint.sh php-fpm"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1"]
      interval: 2s
      timeout: 10s
      retries: 10

  # --- НОВЫЙ СЕРВИС: WP-CRON (Sidecar) ---
  wp-cron:
    build: .
    container_name: wp_cron_worker
    restart: unless-stopped
    volumes:
      # Подключаем те же файлы, чтобы WP-CLI видел код сайта и wp-config.php
      - ./wordpress-files:/var/www/html
      - ./php/wp-php.ini:/usr/local/etc/php/conf.d/wp-php.ini
    environment:
      # Передаем доступы к БД, так как WP-CLI запускает PHP и должен подключаться к базе
      - WORDPRESS_DB_HOST=mariadb
      - WORDPRESS_DB_USER=$SERVICE_USER_WORDPRESS
      - WORDPRESS_DB_PASSWORD=$SERVICE_PASSWORD_WORDPRESS
      - WORDPRESS_DB_NAME=wordpress
    depends_on:
      - mariadb
      - wordpress
    entrypoint: >
      sh -c " echo '⏳ Жду инициализации базы и конфига...' && sleep 20 && echo '🚀 Запуск WP-Cron Worker...' && while true; do
        # Запускаем крон через CLI. --allow-root нужен, так как контейнер стартует от рута.
        # > /dev/null гасит вывод, чтобы не засорять логи, если задач нет.
        wp cron event run --due-now --allow-root --path=/var/www/html > /dev/null 2>&1
        sleep 60
      done"
  # ---------------------------------------

  nginx:
    image: fholzer/nginx-brotli:latest
    entrypoint: >
      /bin/sh -c "
      deluser xfs 2>/dev/null || true;
      delgroup xfs 2>/dev/null || true;
      addgroup -g 33 wpuser 2>/dev/null || true;
      adduser -u 33 -D -H -G wpuser wpuser 2>/dev/null || true;
      sed -i -E 's/user\s+[a-zA-Z0-9_]+;/user wpuser;/' /etc/nginx/nginx.conf || true;
      chown -R 33:33 /var/run/nginx-cache 2>/dev/null || true;
      umask 0000;
      nginx -g 'daemon off;'
      "
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./wordpress-files:/var/www/html
      - ./logs/nginx:/var/log/nginx
      - fastcgi_cache:/var/run/nginx-cache
    depends_on:
      - wordpress

  mariadb:
    image: mariadb:11
    volumes:
      - ./mariadb-data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./create-readonly-user.sh:/docker-entrypoint-initdb.d/init-readonly.sh
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=$SERVICE_PASSWORD_ROOT
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=$SERVICE_USER_WORDPRESS
      - MYSQL_PASSWORD=$SERVICE_PASSWORD_WORDPRESS
      - READONLY_PASSWORD=${READONLY_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1"]
      interval: 5s
      timeout: 20s
      retries: 10

  redis:
    image: redis:latest
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis-data:/data
    command: ["redis-server", "--maxmemory 512mb", "--maxmemory-policy allkeys-lru", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  phpmyadmin:
    image: lscr.io/linuxserver/phpmyadmin:latest
    depends_on:
      - mariadb
    ports:
      - "8070:80"
    environment:
      - PMA_HOST=mariadb
      - PMA_PASSWORD=$SERVICE_PASSWORD_ROOT
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - PMA_ARBITRARY=1
      - PMA_ABSOLUTE_URI=$SERVICE_FQDN_WORDPRESS
    volumes:
      - ./phpmyadmin-config:/config
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:80" ]
      interval: 2s
      timeout: 10s
      retries: 15

# 👇 ИСПРАВЛЕНИЕ: Убраны отступы, блок прижат влево
volumes:
  # Наш RAM-диск для кэша
  fastcgi_cache:
    driver_opts:
      type: tmpfs
      device: tmpfs
      # size=256M: Лимит памяти
      # mode=1777: Разрешает чтение/запись всем
      o: "size=256M,mode=1777"
