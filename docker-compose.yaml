# 👇 ИСПРАВЛЕНИЕ: Убраны отступы, блок прижат влево
volumes:
  # Наш RAM-диск для кэша
  fastcgi_cache:
    driver_opts:
      type: tmpfs
      device: tmpfs
      # size=256M: Лимит памяти
      # uid=33,gid=33: владелец www-data (совпадает с nginx worker и PHP-FPM)
      o: "size=256M,mode=0755,uid=33,gid=33"
