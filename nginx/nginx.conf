# =========================================================================
# 1. НАСТРОЙКИ КЭША FASTCGI
# =========================================================================

fastcgi_cache_path /var/run/nginx-cache levels=1:2 keys_zone=WORDPRESS:100m inactive=60m use_temp_path=off;

# Ключ кэширования. 
# Nginx Helper ожидает: $scheme$request_method$host$request_uri
fastcgi_cache_key "$scheme$request_method$host$request_uri";

fastcgi_cache_use_stale error timeout invalid_header http_500 updating;
fastcgi_ignore_headers Cache-Control Expires Set-Cookie;

# =========================================================================
# 2. ЛОГИКА ИСКЛЮЧЕНИЙ (MAPS)
# =========================================================================

# POST запросы не кэшируем
map $request_method $skip_cache {
    default 0;
    POST    1;
}

# 👇 Умная фильтрация параметров URL
# Мы НЕ отключаем кэш для всего подряд (UTM метки должны кэшироваться!)
# Отключаем только для реальных динамических страниц WP.
map $query_string $skip_cache_query {
    default 0;
    # Отключаем кэш, только если есть эти параметры:
    "~*(s=|p=|search=|preview=|addon=|action=|logout|feed|sitemap)"   1; 
}

# Куки (Auth, Cart)
map $http_cookie $skip_cache_cookie {
    default 0;
    "~*comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in" 1;
    "~*woocommerce_items_in_cart|edd_items_in_cart|woocommerce_cart_hash" 1;
}

# =========================================================================
# 3. НАСТРОЙКИ СЕРВЕРА
# =========================================================================

server {
  listen 80 default_server;
  http2 on;
  server_name _;
  
  # ЛИМИТЫ
  client_max_body_size 256M;

  # Оптимизация дескрипторов
  open_file_cache max=5000 inactive=20s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;
    
  # 👇 Таймауты возвращены к безопасным значениям для Highload
  fastcgi_read_timeout 60s;
  fastcgi_send_timeout 60s;
  fastcgi_connect_timeout 10s;
  
  # Сеть
  keepalive_timeout 45;
  reset_timedout_connection on;
  client_body_timeout 35;
  client_header_timeout 12;
  send_timeout 30;
  
  root /var/www/html;
  index index.php index.html;
  server_tokens off;
  
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  # -----------------------------------------------------------------------
  # БЛОК CompressX (WebP / AVIF)
  # -----------------------------------------------------------------------
  set $ext_avif ".avif";
  if ($http_accept !~* "image/avif") { set $ext_avif ""; }

  set $ext_webp ".webp";
  if ($http_accept !~* "image/webp") { set $ext_webp ""; }

  location ~ /wp-content/(?<path>.+)\.(?<ext>jpe?g|png|gif|webp)$ {
    add_header Vary Accept;
    add_header Cache-Control "private";
    expires 365d;
    try_files
      /wp-content/compressx-nextgen/$path.$ext$ext_avif
      /wp-content/compressx-nextgen/$path.$ext$ext_webp
      /wp-content/$path.$ext
      $uri =404;
  }
  # -----------------------------------------------------------------------

  # БЕЗОПАСНОСТЬ
  location ~* /\.(?!well-known\/) { deny all; }
  location ~\.(ini|log|conf)$ { deny all; }
  location ~* /(?:uploads|files)/.*\.php$ { deny all; }
  location = /xmlrpc.php { deny all; }

  # Игнор логов для служебных файлов
  location = /robots.txt { try_files $uri $uri/ /index.php?$args; access_log off; log_not_found off; }
  location = /favicon.ico { access_log off; log_not_found off; }

  # -----------------------------------------------------------------------
  # СБОРКА УСЛОВИЙ ПРОПУСКА КЭША
  # -----------------------------------------------------------------------
  set $do_skip_cache 0;

  # 1. Метод (POST)
  if ($skip_cache) { set $do_skip_cache 1; }
  
  # 2. 👇 Убрана проверка "любого" Query String.
  # Теперь мы доверяем MAP (см. выше), который фильтрует только s=, preview= и т.д.
  if ($skip_cache_query) { set $do_skip_cache 1; }

  # 3. Куки
  if ($skip_cache_cookie) { set $do_skip_cache 1; }

  # 4. Специфические пути
  if ($request_uri ~* "/wp-admin/|/wp-json/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemaps?(_.*)?\.xml") {
      set $do_skip_cache 1;
  }
  # 5. Магазин
  if ($request_uri ~* "/cart/|/checkout/|/my-account/|/wc-api|/edd-api|/wp-login") {
      set $do_skip_cache 1;
  }

  # -----------------------------------------------------------------------
  # XML-КАРТА САЙТА (SEOPRESS)
  # -----------------------------------------------------------------------
  rewrite ^/sitemaps\.xml$ /index.php?seopress_sitemap=1 last;
  rewrite ^/sitemaps_?([a-zA-Z0-9_-]+)?\.xml$ /index.php?seopress_sitemap=$1 last;
  rewrite ^/sitemaps_?([a-zA-Z0-9_-]+)?\.html$ /index.php?seopress_sitemap_html=$1 last;
  rewrite ^/news\.xml$ /index.php?seopress_news=1 last;
  rewrite ^/author\.xml$ /index.php?seopress_author=1 last;
  rewrite ^/video([0-9]+)?\.xml$ /index.php?seopress_video=1&seopress_paged=$1 last;
  rewrite ^/sitemaps_video_xsl\.xsl$ /index.php?seopress_sitemap_video_xsl=1 last;
  rewrite ^/([^/]+?)-sitemap([0-9]+)?\.xml$ /index.php?seopress_cpt=$1&seopress_paged=$2 last;

  # -----------------------------------------------------------------------
  # ОСНОВНОЙ БЛОК
  # -----------------------------------------------------------------------
  location / {
      try_files $uri $uri/ /index.php?$args;
  }
 
  location ~ \.php$ {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    
    fastcgi_pass wordpress:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param HTTP_HOST $host;
    fastcgi_param REQUEST_SCHEME $scheme;
    fastcgi_param HTTPS on; 

    # КЭШ
    fastcgi_cache WORDPRESS;
    fastcgi_cache_valid 200 60m;
    fastcgi_cache_bypass $do_skip_cache;
    fastcgi_no_cache $do_skip_cache;

    add_header X-FastCGI-Cache $upstream_cache_status;
    
    # Буферы
    fastcgi_buffer_size 128k;
    fastcgi_busy_buffers_size 256k;
    fastcgi_buffers 4 256k;
    
    # Проброс IP
    fastcgi_param HTTP_X_REAL_IP $remote_addr;
    fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
  }

  location ~ /\.ht { deny all; }

  # СТАТИКА
  # 👇 Добавлен woff2
  location ~* ^.+\.(ogg|ogv|svg|svgz|eot|otf|woff|woff2|mp4|ttf|ttc|rss|atom|jpg|jpeg|gif|png|ico|webp|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|wav|bmp|rtf|css|js|html|xml|avif)$ {
      access_log off; 
      log_not_found off;
	  expires max; 
      add_header Cache-Control "public, no-transform";     
  }
    
  # СЖАТИЕ
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  
  gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/vnd.ms-fontobject
    application/wasm
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/bmp
	image/svg+xml
    text/cache-manifest
    text/calendar
    text/css
    text/javascript
    text/markdown
    text/plain
    text/xml
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

    # Brotli
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}